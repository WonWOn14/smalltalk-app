<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 스몰토크 추천</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Pretendard', Arial, sans-serif;
      background: linear-gradient(135deg, #4a90e2, #6fc3ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 35px;
      border-radius: 20px;
      width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }

    #result {
      margin-top: 20px;
    }

    .card {
      background: #f3f6ff;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .card-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .copy-btn {
      margin-top: 10px;
      padding: 8px;
      font-size: 12px;
      background: #eee;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🤖 스몰토크 추천</h1>

  <label>고객사 산업</label>
  <input type="text" id="industry" placeholder="예: IT, 금융">

  <label>미팅 목적</label>
  <input type="text" id="purpose" placeholder="예: 제안 미팅">

  <label>분위기</label>
  <select id="tone">
    <option value="격식 있는">격식 있는</option>
    <option value="편한">편한</option>
  </select>

  <button id="btn" onclick="generateTalk()">✨ 생성하기</button>

  <div id="result"></div>

  <div class="footer">© AI Sales Assistant</div>
</div>

<script>
async function generateTalk() {
  const industry = document.getElementById("industry").value.trim();
  const purpose = document.getElementById("purpose").value.trim();
  const tone = document.getElementById("tone").value;

  const resultBox = document.getElementById("result");
  const button = document.getElementById("btn");

  if (!industry || !purpose) {
    resultBox.innerHTML = "⚠️ 산업과 목적을 입력해주세요.";
    return;
  }

  resultBox.innerHTML = "⏳ 생성 중...";
  button.disabled = true;

  try {
    const response = await fetch("http://localhost:3000/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ industry, purpose, tone })
    });

    const data = await response.json();

    if (data.error) {
      resultBox.innerHTML = "❌ 오류 발생";
    } else {
      const text = data.choices[0].message.content;

      // 🔥 카드 형태로 변환
      const sections = text.split(/\d\./).filter(v => v.trim() !== "");

      const titles = [
        "오프닝 멘트",
        "스몰토크",
        "본론 전환",
        "피해야 할 주제"
      ];

      let html = "";

      sections.forEach((sec, i) => {
        html += `
          <div class="card">
            <div class="card-title">🔹 ${titles[i] || ""}</div>
            <div>${sec.trim().replace(/\n/g, "<br>")}</div>
            <div class="copy-btn" onclick="copyText(this)">복사하기</div>
          </div>
        `;
      });

      resultBox.innerHTML = html;
    }

  } catch (error) {
    resultBox.innerHTML = "⚠️ 서버 연결 실패";
  }

  button.disabled = false;
}

// 복사 기능
function copyText(el) {
  const text = el.previousElementSibling.innerText;
  navigator.clipboard.writeText(text);
  el.innerText = "✅ 복사됨!";
  setTimeout(() => el.innerText = "복사하기", 1500);
}
</script>

</body>
</html>
